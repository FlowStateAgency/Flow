    <script src="https://unpkg.com/scrollreveal"></script>
    <script>
        ScrollReveal().reveal('[data-scroll]', {
            delay: 100,
            duration: 800,
            origin: 'bottom',
            distance: '20px',
            opacity: 0
        });

        // Bloqueio de clique direito (conforme seu padrão)
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
